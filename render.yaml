# Render Blueprint — relayer only.
# If you created the service manually, set Root Directory = services/relayer in the dashboard
# (Blueprint rootDir alone is not applied until the service is linked to this file).
# Secrets: RELAYER_SIGNER_PRIVATE_KEYS, RELAYER_RPC_URL_* in Render UI.

services:
  - type: web
    name: shielded-relayer
    runtime: node
    # Deploy only the relayer package (avoids monorepo lockfile / web app deps).
    rootDir: services/relayer
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "22"
