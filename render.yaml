# Render Blueprint — deploy relayer from monorepo root.
# Dashboard: New → Blueprint, or link repo and apply this file.
# Set secrets in Render UI: RELAYER_SIGNER_PRIVATE_KEYS, RELAYER_RPC_URL_* .

services:
  - type: web
    name: shielded-relayer
    runtime: node
    # Deploy only the relayer package (avoids monorepo lockfile / web app deps).
    rootDir: services/relayer
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "22"
