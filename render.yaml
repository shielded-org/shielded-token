

services:
  - type: web
    name: shielded-relayer
    runtime: node
    # Deploy only the relayer package (avoids monorepo lockfile / web app deps).
    rootDir: services/relayer
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "22"
